version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/auth/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/auth/db/"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true

